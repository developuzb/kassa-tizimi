<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f3f5fb" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b0b12" media="(prefers-color-scheme: dark)" />
  <!-- iOS: "Add to Home Screen" da to'liq ekran ilova ko'rinishi -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kassa" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Kassa Tizimi</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- PWA: o'rnatiladigan ilova + offline -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="brand">💳 <span>Kassa</span></div>
    <div class="header-right">
      <span id="current-staff" class="staff-badge">Smena yopiq</span>
      <span id="net-status" class="net-status offline" title="Internet holati">●</span>
    </div>
  </header>

  <!-- ===== ASOSIY KONTENT ===== -->
  <main id="app-main">
    <section id="view-kassa" class="view active"></section>
    <section id="view-ombor" class="view"></section>
    <section id="view-mijoz" class="view"></section>
    <section id="view-xodimlar" class="view"></section>
    <section id="view-hisobot" class="view"></section>
    <section id="view-admin" class="view"></section>
  </main>

  <!-- ===== PASTKI NAVIGATSIYA ===== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="kassa">🛒<span>Kassa</span></button>
    <button class="nav-btn" data-view="ombor">📦<span>Ombor</span></button>
    <button class="nav-btn" data-view="mijoz">🙋<span>Mijoz</span></button>
    <button class="nav-btn" data-view="xodimlar">👥<span>Xodim</span></button>
    <button class="nav-btn" data-view="hisobot">📊<span>Hisobot</span></button>
    <button class="nav-btn" data-view="admin">🔐<span>Admin</span></button>
  </nav>

  <!-- ===== MODAL KONTEYNER ===== -->
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <!-- Chart.js — lokal nusxa (CDN'ga bog'liq emas, to'liq offline ishlaydi) -->
  <script src="js/vendor/chart.umd.min.js"></script>

  <!-- Ilova skriptlari (tartib muhim) -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/kassa.js"></script>
  <script src="js/inventar.js"></script>
  <script src="js/mijozlar.js"></script>
  <script src="js/xodimlar.js"></script>
  <script src="js/hisobotlar.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

  <!-- PWA: service worker'ni ro'yxatdan o'tkazish (offline rejim) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err =>
          console.warn('Service worker ro\'yxatdan o\'tmadi:', err));
      });
    }
  </script>
</body>
</html>
